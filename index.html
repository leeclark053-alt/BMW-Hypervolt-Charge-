<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BMW i3 Charge Tool</title>

<link rel="manifest" href="manifest.json">

<style>

body {

  font-family: -apple-system;

  background: #000;

  color: #fff;

  text-align: center;

  padding: 15px;

}

.card {

  background: #1c1c1e;

  padding: 20px;

  border-radius: 18px;

  max-width: 420px;

  margin: auto;

}

.car-img {

  width: 100%;

  border-radius: 12px;

}

.slider {

  width: 90%;

}

button {

  padding: 10px;

  margin: 5px;

  border-radius: 10px;

  border: none;

  background: #2c2c2e;

  color: white;

}

.main {

  background: #0a84ff;

}

.result {

  margin-top: 20px;

}

</style>

</head>

<body>

<div class="card">

<h2>BMW i3 Charge Tool</h2>

<img class="car-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/BMW_i3_2013.jpg/1024px-BMW_i3_2013.jpg">

<div>Current %</div>

<input type="range" min="0" max="100" value="40" id="current" class="slider">

<div>Target %</div>

<input type="range" min="0" max="100" value="80" id="target" class="slider">

<br>

<button onclick="calc()">Calculate</button>

<div class="result" id="out"></div>

</div>

<script>

const PRICE = 0.0349;

const SIZE = 39;

const REF = 69;

function calc(){

  const c = +document.getElementById("current").value;

  const t = +document.getElementById("target").value;

  if(t <= c){

    out.innerHTML = "Target must be higher";

    return;

  }

  const kWh = (t-c)/100 * SIZE;

  const pct = (kWh/REF)*100;

  const cost = kWh * PRICE;

  out.innerHTML =

    `🔋 ${kWh.toFixed(2)} kWh<br>

     ⚡ Charger: ${pct.toFixed(1)}%<br>

     💷 £${cost.toFixed(2)}`;

}

</script>

<script>

if ('serviceWorker' in navigator) {

  navigator.serviceWorker.register('sw.js');

}

</script>

</body>

</html>
